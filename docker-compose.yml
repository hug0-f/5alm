name: lebontroc

services:
  db:
    image: postgres:18-alpine
    container_name: lebontroc-db
    restart: unless-stopped
    env_file:
      - ./app/.env
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  wa-service:
    build:
      context: ./service
    container_name: lebontroc-wa
    restart: unless-stopped
    tty: true
    stdin_open: true
    environment:
      WA_PORT: "3001"
    expose:
      - "3001"
    volumes:
      - wa_auth:/app/auth_info
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  app:
    build:
      context: ./app
    container_name: lebontroc-app
    restart: unless-stopped
    env_file:
      - ./app/.env
    environment:
      WA_SERVICE_URL: "http://wa-service:3001"
      NODE_ENV: "production"
    ports:
      - "5000:3000"
    depends_on:
      db:
        condition: service_healthy
      wa-service:
        condition: service_started

volumes:
  wa_auth:
    name: lebontroc_wa_auth
  db_data:
    name: lebontroc_db_data
